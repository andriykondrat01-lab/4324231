<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <!-- Background -->
  <rect width="800" height="200" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#58a6ff" font-size="22" font-weight="bold">Пошук у Ширину — Breadth-First Search</text>

  <!-- Nodes with BFS levels colored differently -->
  <!-- Level 0: A (start) -->
  <circle cx="120" cy="110" r="26" fill="#238636" stroke="#3fb950" stroke-width="2"/>
  <text x="120" y="116" text-anchor="middle" fill="white" font-size="16" font-weight="bold">A</text>
  <text x="120" y="155" text-anchor="middle" fill="#3fb950" font-size="11">рівень 0</text>

  <!-- Level 1: B, C -->
  <circle cx="270" cy="70" r="26" fill="#1f4d8c" stroke="#58a6ff" stroke-width="2"/>
  <text x="270" y="76" text-anchor="middle" fill="white" font-size="16" font-weight="bold">B</text>
  <text x="270" y="155" text-anchor="middle" fill="#58a6ff" font-size="11">рівень 1</text>

  <circle cx="270" cy="150" r="26" fill="#1f4d8c" stroke="#58a6ff" stroke-width="2"/>
  <text x="270" y="156" text-anchor="middle" fill="white" font-size="16" font-weight="bold">C</text>

  <!-- Level 2: D, E, F -->
  <circle cx="430" cy="50" r="26" fill="#5a3e8c" stroke="#bc8cff" stroke-width="2"/>
  <text x="430" y="56" text-anchor="middle" fill="white" font-size="16" font-weight="bold">D</text>
  <text x="430" y="155" text-anchor="middle" fill="#bc8cff" font-size="11">рівень 2</text>

  <circle cx="430" cy="110" r="26" fill="#5a3e8c" stroke="#bc8cff" stroke-width="2"/>
  <text x="430" y="116" text-anchor="middle" fill="white" font-size="16" font-weight="bold">E</text>

  <circle cx="430" cy="168" r="26" fill="#5a3e8c" stroke="#bc8cff" stroke-width="2"/>
  <text x="430" y="174" text-anchor="middle" fill="white" font-size="16" font-weight="bold">F</text>

  <!-- Level 3: G -->
  <circle cx="590" cy="80" r="26" fill="#7a2020" stroke="#f85149" stroke-width="2"/>
  <text x="590" y="86" text-anchor="middle" fill="white" font-size="16" font-weight="bold">G</text>
  <text x="590" y="155" text-anchor="middle" fill="#f85149" font-size="11">рівень 3</text>

  <circle cx="590" cy="140" r="26" fill="#7a2020" stroke="#f85149" stroke-width="2"/>
  <text x="590" y="146" text-anchor="middle" fill="white" font-size="16" font-weight="bold">H</text>

  <!-- Edges -->
  <line x1="146" y1="101" x2="244" y2="78" stroke="#484f58" stroke-width="2"/>
  <line x1="146" y1="119" x2="244" y2="143" stroke="#484f58" stroke-width="2"/>
  <line x1="296" y1="76" x2="404" y2="60" stroke="#484f58" stroke-width="2"/>
  <line x1="296" y1="80" x2="404" y2="105" stroke="#484f58" stroke-width="2"/>
  <line x1="296" y1="144" x2="404" y2="160" stroke="#484f58" stroke-width="2"/>
  <line x1="456" y1="65" x2="564" y2="75" stroke="#484f58" stroke-width="2"/>
  <line x1="456" y1="120" x2="564" y2="133" stroke="#484f58" stroke-width="2"/>

  <!-- Queue visualization -->
  <text x="680" y="55" text-anchor="middle" fill="#8b949e" font-size="12">Черга:</text>
  <rect x="645" y="65" width="90" height="28" fill="#161b22" stroke="#30363d" rx="4"/>
  <text x="690" y="84" text-anchor="middle" fill="#e6edf3" font-size="13">A B C D E</text>
  <text x="690" y="115" text-anchor="middle" fill="#8b949e" font-size="11">FIFO</text>
  <text x="690" y="135" text-anchor="middle" fill="#8b949e" font-size="11">← деqueue</text>
  <text x="690" y="152" text-anchor="middle" fill="#8b949e" font-size="11">enqueue →</text>
</svg>
